name: ai-airflow-ci-cd

on:
  push:
    branches: [main]
    tags:
      - "v*.*.*"
  pull_request:
    branches: [main]
  workflow_dispatch:

# Prevent overlapping deploys to the same ref/environment.
concurrency:
  group: ai-airflow-${{ github.ref }}
  cancel-in-progress: true

env:
  AWS_REGION: us-east-1
  PROJECT_NAME: ai-airflow
  EKS_CLUSTER_NAME: ai-airflow-eks
  ECR_REPOSITORY: ai-airflow
  K8S_NAMESPACE_STAGING: ai-airflow-staging
  K8S_NAMESPACE_PRODUCTION: ai-airflow-production
  IMAGE_TAG: ${{ github.sha }}
  COVERAGE_MINIMUM: "70"

permissions:
  contents: read
  id-token: write # Required for GitHub OIDC -> AWS role assumption
  security-events: write

jobs:
  detect:
    name: Detect project structure
    runs-on: ubuntu-latest
    outputs:
      has_backend: ${{ steps.detect.outputs.has_backend }}
      has_frontend: ${{ steps.detect.outputs.has_frontend }}
      backend_lang: ${{ steps.detect.outputs.backend_lang }}
      frontend_lang: ${{ steps.detect.outputs.frontend_lang }}
      dockerfile_exists: ${{ steps.detect.outputs.dockerfile_exists }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - id: detect
        name: Inspect repository
        shell: bash
        run: |
          set -euo pipefail

          if [ -d backend ]; then echo "has_backend=true" >> "$GITHUB_OUTPUT"; else echo "has_backend=false" >> "$GITHUB_OUTPUT"; fi
          if [ -d frontend ]; then echo "has_frontend=true" >> "$GITHUB_OUTPUT"; else echo "has_frontend=false" >> "$GITHUB_OUTPUT"; fi
          if [ -f Dockerfile ]; then echo "dockerfile_exists=true" >> "$GITHUB_OUTPUT"; else echo "dockerfile_exists=false" >> "$GITHUB_OUTPUT"; fi

          backend_lang="unknown"
          frontend_lang="unknown"

          # Basic language detection so the pipeline can support common stacks
          if [ -f backend/package.json ]; then backend_lang="node"; fi
          if [ -f backend/requirements.txt ] || [ -f backend/pyproject.toml ]; then backend_lang="python"; fi
          if [ -f backend/go.mod ]; then backend_lang="go"; fi
          if [ -f backend/pom.xml ] || [ -f backend/build.gradle ] || [ -f backend/build.gradle.kts ]; then backend_lang="java"; fi

          if [ -f frontend/package.json ]; then frontend_lang="node"; fi

          echo "backend_lang=${backend_lang}" >> "$GITHUB_OUTPUT"
          echo "frontend_lang=${frontend_lang}" >> "$GITHUB_OUTPUT"

  test-and-scan:
    name: Build, test, coverage, and dependency scan
    runs-on: ubuntu-latest
    needs: detect
    strategy:
      fail-fast: false
      matrix:
        component: [backend, frontend]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Skip missing component
        if: |
          (matrix.component == 'backend' && needs.detect.outputs.has_backend != 'true') ||
          (matrix.component == 'frontend' && needs.detect.outputs.has_frontend != 'true')
        run: |
          echo "Component ${{ matrix.component }} not present, skipping."
          exit 0

      # -------- Node setup --------
      - name: Setup Node.js
        if: |
          (matrix.component == 'backend' && needs.detect.outputs.backend_lang == 'node') ||
          (matrix.component == 'frontend' && needs.detect.outputs.frontend_lang == 'node')
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: |
            backend/package-lock.json
            frontend/package-lock.json

      # -------- Python setup --------
      - name: Setup Python
        if: matrix.component == 'backend' && needs.detect.outputs.backend_lang == 'python'
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: |
            backend/requirements.txt
            backend/pyproject.toml

      # -------- Install deps / tests: Node --------
      - name: Install dependencies (Node)
        if: |
          (matrix.component == 'backend' && needs.detect.outputs.backend_lang == 'node') ||
          (matrix.component == 'frontend' && needs.detect.outputs.frontend_lang == 'node')
        working-directory: ${{ matrix.component }}
        shell: bash
        run: |
          set -euo pipefail
          if [ -f package-lock.json ]; then
            npm ci
          else
            npm install
          fi

      - name: Run tests with coverage (Node)
        if: |
          (matrix.component == 'backend' && needs.detect.outputs.backend_lang == 'node') ||
          (matrix.component == 'frontend' && needs.detect.outputs.frontend_lang == 'node')
        working-directory: ${{ matrix.component }}
        shell: bash
        run: |
          set -euo pipefail

          # Junior note:
          # We try common test scripts first. If the repo doesn't define them yet,
          # this step fails intentionally so the team adds deterministic tests.
          if npm run | grep -q "test:coverage"; then
            npm run test:coverage
          elif npm run | grep -q "coverage"; then
            npm run coverage
          elif npm run | grep -q "test"; then
            npm test -- --coverage
          else
            echo "No Node test script found in $PWD"
            exit 1
          fi

      - name: Enforce coverage threshold (Node)
        if: |
          (matrix.component == 'backend' && needs.detect.outputs.backend_lang == 'node') ||
          (matrix.component == 'frontend' && needs.detect.outputs.frontend_lang == 'node')
        working-directory: ${{ matrix.component }}
        shell: bash
        run: |
          set -euo pipefail

          # Reads Jest-style coverage summary if present.
          if [ -f coverage/coverage-summary.json ]; then
            pct=$(node -e "const f=require('./coverage/coverage-summary.json'); console.log(f.total.lines.pct)")
            echo "Detected line coverage: $pct%"
            awk -v a="$pct" -v b="${COVERAGE_MINIMUM}" 'BEGIN { exit (a+0 >= b+0 ? 0 : 1) }'
          else
            echo "coverage/coverage-summary.json not found; cannot verify threshold."
            exit 1
          fi

      - name: Dependency audit (Node)
        if: |
          (matrix.component == 'backend' && needs.detect.outputs.backend_lang == 'node') ||
          (matrix.component == 'frontend' && needs.detect.outputs.frontend_lang == 'node')
        working-directory: ${{ matrix.component }}
        shell: bash
        run: |
          set -euo pipefail
          npm audit --audit-level=high

      # -------- Install deps / tests: Python --------
      - name: Install dependencies (Python)
        if: matrix.component == 'backend' && needs.detect.outputs.backend_lang == 'python'
        working-directory: backend
        shell: bash
        run: |
          set -euo pipefail
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
          # Testing tools installed explicitly to keep CI deterministic
          pip install pytest pytest-cov pip-audit

      - name: Run tests with coverage (Python)
        if: matrix.component == 'backend' && needs.detect.outputs.backend_lang == 'python'
        working-directory: backend
        shell: bash
        run: |
          set -euo pipefail
          pytest --cov=. --cov-report=xml --cov-report=term --cov-fail-under=${COVERAGE_MINIMUM}

      - name: Dependency audit (Python)
        if: matrix.component == 'backend' && needs.detect.outputs.backend_lang == 'python'
        working-directory: backend
        shell: bash
        run: |
          set -euo pipefail
          pip-audit --strict

      - name: Upload coverage artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-${{ matrix.component }}
          path: |
            backend/coverage
            backend/coverage.xml
            frontend/coverage
          if-no-files-found: ignore

  docker-build-and-scan:
    name: Container build and Trivy scan
    runs-on: ubuntu-latest
    needs: [detect, test-and-scan]
    outputs:
      image_uri: ${{ steps.meta.outputs.image_uri }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-region: ${{ env.AWS_REGION }}
          role-to-assume: ${{ secrets.AWS_GITHUB_ACTIONS_ROLE_ARN }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - id: meta
        name: Set image metadata
        shell: bash
        run: |
          set -euo pipefail
          IMAGE_URI="${{ steps.login-ecr.outputs.registry }}/${ECR_REPOSITORY}:${IMAGE_TAG}"
          echo "image_uri=${IMAGE_URI}" >> "$GITHUB_OUTPUT"

      - name: Generate production Dockerfile if missing
        if: needs.detect.outputs.dockerfile_exists != 'true'
        shell: bash
        run: |
          set -euo pipefail

          # Junior note:
          # Because the repo has no Dockerfile, we generate a conservative multi-stage one.
          # It supports common frontend/backend layouts and serves built frontend via nginx.
          cat > Dockerfile <<'EOF'
          # syntax=docker/dockerfile:1.7

          FROM node:20-alpine AS frontend-build
          WORKDIR /app/frontend
          COPY frontend/package*.json ./
          RUN if [ -f package.json ]; then npm ci || npm install; fi
          COPY frontend/ ./
          RUN if [ -f package.json ]; then npm run build || true; fi

          FROM python:3.11-slim AS backend-python
          WORKDIR /app/backend
          COPY backend/requirements.txt ./requirements.txt
          RUN if [ -f requirements.txt ]; then pip install --no-cache-dir -r requirements.txt; fi
          COPY backend/ ./

          FROM node:20-alpine AS backend-node
          WORKDIR /app/backend
          COPY backend/package*.json ./
          RUN if [ -f package.json ]; then npm ci || npm install; fi
          COPY backend/ ./

          FROM nginx:1.27-alpine AS final
          WORKDIR /usr/share/nginx/html
          COPY --from=frontend-build /app/frontend/dist ./ || true
          COPY --from=frontend-build /app/frontend/build ./ || true
          # If your app is API-only, replace this generated Dockerfile with a custom one in-repo.
          EXPOSE 80
          CMD ["nginx", "-g", "daemon off;"]
          EOF

      - name: Build container image
        shell: bash
        run: |
          set -euo pipefail
          docker build -t "${{ steps.meta.outputs.image_uri }}" .

      - name: Run Trivy filesystem scan
        uses: aquasecurity/trivy-action@0.24.0
        with:
          scan-type: fs
          scan-ref: .
          format: table
          exit-code: "1"
          severity: HIGH,CRITICAL
          ignore-unfixed: true

      - name: Run Trivy image scan
        uses: aquasecurity/trivy-action@0.24.0
        with:
          image-ref: ${{ steps.meta.outputs.image_uri }}
          format: sarif
          output: trivy-image.sarif
          exit-code: "1"
          severity: HIGH,CRITICAL
          ignore-unfixed: true

      - name: Upload Trivy SARIF to GitHub Security
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-image.sarif

      - name: Push image to ECR
        if: github.event_name != 'pull_request'
        shell: bash
        run: |
          set -euo pipefail
          docker push "${{ steps.meta.outputs.image_uri }}"

  deploy-staging:
    name: Deploy to staging on EKS
    runs-on: ubuntu-latest
    needs: docker-build-and-scan
    if: github.event_name != 'pull_request'
    environment:
      name: staging
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-region: ${{ env.AWS_REGION }}
          role-to-assume: ${{ secrets.AWS_GITHUB_ACTIONS_ROLE_ARN }}

      - name: Update kubeconfig for EKS
        shell: bash
        run: |
          set -euo pipefail
          aws eks update-kubeconfig --name "${EKS_CLUSTER_NAME}" --region "${AWS_REGION}"

      - name: Create staging namespace if missing
        shell: bash
        run: |
          set -euo pipefail
          kubectl get namespace "${K8S_NAMESPACE_STAGING}" >/dev/null 2>&1 || kubectl create namespace "${K8S_NAMESPACE_STAGING}"

      - name: Render Kubernetes manifests
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p k8s-rendered

          cat > k8s-rendered/deployment.yaml <<EOF
          apiVersion: apps/v1
          kind: Deployment
          metadata:
            name: ${PROJECT_NAME}
            namespace: ${K8S_NAMESPACE_STAGING}
            labels:
              app: ${PROJECT_NAME}
          spec:
            replicas: 2
            revisionHistoryLimit: 5
            strategy:
              type: RollingUpdate
              rollingUpdate:
                maxUnavailable: 0
                maxSurge: 1
            selector:
              matchLabels:
                app: ${PROJECT_NAME}
            template:
              metadata:
                labels:
                  app: ${PROJECT_NAME}
              spec:
                containers:
                  - name: ${PROJECT_NAME}
                    image: ${IMAGE}
                    imagePullPolicy: IfNotPresent
                    ports:
                      - containerPort: 80
                    readinessProbe:
                      httpGet:
                        path: /
                        port: 80
                      initialDelaySeconds: 10
                      periodSeconds: 10
                    livenessProbe:
                      httpGet:
                        path: /
                        port: 80
                      initialDelaySeconds: 20
                      periodSeconds: 20
                    securityContext:
                      allowPrivilegeEscalation: false
                      readOnlyRootFilesystem: true
                      runAsNonRoot: true
                    resources:
                      requests:
                        cpu: "100m"
                        memory: "128Mi"
                      limits:
                        cpu: "500m"
                        memory: "512Mi"
          EOF

          cat > k8s-rendered/service.yaml <<EOF
          apiVersion: v1
          kind: Service
          metadata:
            name: ${PROJECT_NAME}
            namespace: ${K8S_NAMESPACE_STAGING}
          spec:
            selector:
              app: ${PROJECT_NAME}
            ports:
              - protocol: TCP
                port: 80
                targetPort: 80
            type: ClusterIP
          EOF

          IMAGE="${{ needs.docker-build-and-scan.outputs.image_uri }}"
          export IMAGE
          envsubst < k8s-rendered/deployment.yaml > k8s-rendered/deployment.rendered.yaml
          mv k8s-rendered/deployment.rendered.yaml k8s-rendered/deployment.yaml

      - name: Apply manifests to staging
        shell: bash
        run: |
          set -euo pipefail
          kubectl apply -f k8s-rendered/service.yaml
          kubectl apply -f k8s-rendered/deployment.yaml

      - name: Wait for rolling deployment to complete
        shell: bash
        run: |
          set -euo pipefail
          kubectl rollout status deployment/${PROJECT_NAME} -n ${K8S_NAMESPACE_STAGING} --timeout=5m

      - name: Roll back staging if rollout fails
        if: failure()
        shell: bash
        run: |
          kubectl rollout undo deployment/${PROJECT_NAME} -n ${K8S_NAMESPACE_STAGING} || true

  deploy-production:
    name: Deploy to production on EKS
    runs-on: ubuntu-latest
    needs: [docker-build-and-scan, deploy-staging]
    if: github.event_name != 'pull_request' && github.ref == 'refs/heads/main'
    environment:
      name: production
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-region: ${{ env.AWS_REGION }}
          role-to-assume: ${{ secrets.AWS_GITHUB_ACTIONS_ROLE_ARN }}

      - name: Update kubeconfig for EKS
        shell: bash
        run: |
          set -euo pipefail
          aws eks update-kubeconfig --name "${EKS_CLUSTER_NAME}" --region "${AWS_REGION}"

      - name: Create production namespace if missing
        shell: bash
        run: |
          set -euo pipefail
          kubectl get namespace "${K8S_NAMESPACE_PRODUCTION}" >/dev/null 2>&1 || kubectl create namespace "${K8S_NAMESPACE_PRODUCTION}"

      - name: Render Kubernetes manifests
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p k8s-rendered

          cat > k8s-rendered/deployment.yaml <<EOF
          apiVersion: apps/v1
          kind: Deployment
          metadata:
            name: ${PROJECT_NAME}
            namespace: ${K8S_NAMESPACE_PRODUCTION}
            labels:
              app: ${PROJECT_NAME}
          spec:
            replicas: 3
            revisionHistoryLimit: 10
            strategy:
              type: RollingUpdate
              rollingUpdate:
                maxUnavailable: 0
                maxSurge: 1
            selector:
              matchLabels:
                app: ${PROJECT_NAME}
            template:
              metadata:
                labels:
                  app: ${PROJECT_NAME}
              spec:
                containers:
                  - name: ${PROJECT_NAME}
                    image: ${IMAGE}
                    imagePullPolicy: IfNotPresent
                    ports:
                      - containerPort: 80
                    readinessProbe:
                      httpGet:
                        path: /
                        port: 80
                      initialDelaySeconds: 10
                      periodSeconds: 10
                    livenessProbe:
                      httpGet:
                        path: /
                        port: 80
                      initialDelaySeconds: 20
                      periodSeconds: 20
                    securityContext:
                      allowPrivilegeEscalation: false
                      readOnlyRootFilesystem: true
                      runAsNonRoot: true
                    resources:
                      requests:
                        cpu: "100m"
                        memory: "128Mi"
                      limits:
                        cpu: "500m"
                        memory: "512Mi"
          EOF

          cat > k8s-rendered/service.yaml <<EOF
          apiVersion: v1
          kind: Service
          metadata:
            name: ${PROJECT_NAME}
            namespace: ${K8S_NAMESPACE_PRODUCTION}
          spec:
            selector:
              app: ${PROJECT_NAME}
            ports:
              - protocol: TCP
                port: 80
                targetPort: 80
            type: ClusterIP
          EOF

          IMAGE="${{ needs.docker-build-and-scan.outputs.image_uri }}"
          export IMAGE
          envsubst < k8s-rendered/deployment.yaml > k8s-rendered/deployment.rendered.yaml
          mv k8s-rendered/deployment.rendered.yaml k8s-rendered/deployment.yaml

      - name: Apply manifests to production
        shell: bash
        run: |
          set -euo pipefail
          kubectl apply -f k8s-rendered/service.yaml
          kubectl apply -f k8s-rendered/deployment.yaml

      - name: Wait for rolling deployment to complete
        shell: bash
        run: |
          set -euo pipefail
          kubectl rollout status deployment/${PROJECT_NAME} -n ${K8S_NAMESPACE_PRODUCTION} --timeout=10m

      - name: Verify deployed image
        shell: bash
        run: |
          set -euo pipefail
          kubectl get deployment ${PROJECT_NAME} -n ${K8S_NAMESPACE_PRODUCTION} -o jsonpath='{.spec.template.spec.containers[0].image}'
          echo

      - name: Roll back production if rollout fails
        if: failure()
        shell: bash
        run: |
          kubectl rollout undo deployment/${PROJECT_NAME} -n ${K8S_NAMESPACE_PRODUCTION} || true
